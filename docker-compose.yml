services:
  nginx:
    image: nginx:latest
    container_name: openstream-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./infrastructure/nginx/conf/default.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: openstream-frontend
    ports:
      - "9090:80"
    restart: unless-stopped