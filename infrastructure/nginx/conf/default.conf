server {
    listen 80;
    server_name _;

    charset utf-8;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /api/ {
        return 200 "OpenStream API will be here.\n";
        add_header Content-Type text/plain;
    }

    location /hls/ {
        return 200 "OpenStream HLS streaming files will be here.\n";
        add_header Content-Type text/plain;
    }
}